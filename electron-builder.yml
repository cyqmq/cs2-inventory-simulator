appId: com.ianlucas.cs2-inventory-simulator
productName: CS2 Inventory Simulator
directories:
  output: release
  buildResources: build
files:
  - build/client/**/*
  - dist-electron/**/*
  - package.json
win:
  target:
    - target: nsis
      arch:
        - x64
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
linux:
  target:
    - target: AppImage
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  perMachine: false
